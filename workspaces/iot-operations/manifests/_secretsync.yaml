apiVersion: siteops/v1
kind: Manifest
name: secretsync-step
description: |
  Workload-identity-backed secret sync for an existing AIO instance.

  Internal partial (filename prefixed `_`). Not deployed directly. Composed
  by `secretsync.yaml` (the standalone day-2 entry point) and by
  `aio-install.yaml` (gated by `enableSecretSync`).

steps:
  - name: secretsync
    template: templates/secretsync/enable-secretsync.bicep
    scope: resourceGroup
    parameters:
      - parameters/inputs/secretsync.yaml
