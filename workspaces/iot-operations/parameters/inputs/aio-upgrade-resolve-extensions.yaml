# Fan-in inputs into the resolve-extensions step of aio-upgrade.yaml. See
# docs/parameter-resolution.md for the inputs/outputs convention.
# Consumed by: resolve-extensions (in aio-upgrade.yaml)

# Cluster identity for direct existing lookup + the resource ID needed to
# derive the AIO Arc extension name through the shared source-of-truth deriver.
connectedClusterName: "{{ steps.resolve-aio.outputs.connectedClusterName }}"
connectedClusterResourceId: "{{ steps.resolve-aio.outputs.connectedClusterResourceId }}"

# cert-manager ownership flag from site config. False skips cert-manager
# resolution so externally-managed cert-manager installs are never touched.
enableCertManager: "{{ site.properties.deployOptions.enableCertManager }}"
