# Fan-in inputs into the secretsync step, pulled from the resolve-aio upstream.
# See docs/parameter-resolution.md for the inputs/outputs convention.
# Consumed by: secretsync (in both aio-install.yaml and standalone secretsync.yaml)

# Resolved infrastructure names
customLocationId: "{{ steps.resolve-aio.outputs.customLocationId }}"
customLocationName: "{{ steps.resolve-aio.outputs.customLocationName }}"
customLocationNamespace: "{{ steps.resolve-aio.outputs.customLocationNamespace }}"
connectedClusterName: "{{ steps.resolve-aio.outputs.connectedClusterName }}"
oidcIssuerUrl: "{{ steps.resolve-aio.outputs.oidcIssuerUrl }}"

# Instance properties for safe PUT forwarding
instanceLocation: "{{ steps.resolve-aio.outputs.instanceLocation }}"
instanceTags: "{{ steps.resolve-aio.outputs.instanceTags }}"
identityType: "{{ steps.resolve-aio.outputs.identityType }}"
userAssignedIdentities: "{{ steps.resolve-aio.outputs.userAssignedIdentities }}"
schemaRegistryResourceId: "{{ steps.resolve-aio.outputs.schemaRegistryResourceId }}"
adrNamespaceResourceId: "{{ steps.resolve-aio.outputs.adrNamespaceResourceId }}"
features: "{{ steps.resolve-aio.outputs.features }}"
instanceDescription: "{{ steps.resolve-aio.outputs.instanceDescription }}"
