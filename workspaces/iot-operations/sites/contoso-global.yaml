# Contoso Global Subscription Site
#
# Subscription-level site for deploying shared resources once per subscription.
# RG-level sites in the same subscription resolve outputs from this site
# via cross-scope output chaining.
#
# This site has no resourceGroup, so only `scope: subscription` steps run.
# The global-edge-site step deploys here, then munich-dev, seattle-dev, etc.
# can reference its outputs.
#
# Target with: -l scope=subscription   (the default `environment=dev` selector
# in aio-install.yaml does not match this site, by design.)
#
# AIO-install fields inherited from base-site.yaml (aioRelease, brokerConfig,
# defaultDataflowInstanceCount, deployOptions.enableSecretSync, etc.) are
# inert here. No resourceGroup-scoped step runs against this site.

apiVersion: siteops/v1
kind: Site
name: contoso-global
inherits: base-site.yaml

subscription: "00000000-0000-0000-0000-000000000000"
location: eastus
# No resourceGroup → subscription-level site

labels:
  scope: subscription
  country: US
  city: Redmond

properties:
  deployOptions:
    enableGlobalSite: true        # Deploy subscription-scoped edge site
    enableEdgeSite: false         # No RG, skip RG-scoped edge site

parameters:
  siteName: contoso-edge-site
