# Hamburg Shared Dev Site
#
# One shared dev AIO instance for the Hamburg site.

apiVersion: siteops/v1
kind: Site
name: hamburg-dev
inherits: shared/germany.yaml

# subscription, location, country inherited from shared/germany.yaml
resourceGroup: rg-iot-hamburg-dev

labels:
  environment: dev
  city: Hamburg

parameters:
  clusterName: hamburg-dev-arc
  brokerConfig:
    frontendReplicas: 1
    frontendWorkers: 1
    backendRedundancyFactor: 2
    backendWorkers: 1
    backendPartitions: 1
    memoryProfile: Low
