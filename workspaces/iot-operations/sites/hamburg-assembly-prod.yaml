# Hamburg Assembly Line - Production Site
#
# Production AIO instance for the Hamburg assembly line factory.

apiVersion: siteops/v1
kind: Site
name: hamburg-assembly-prod
inherits: shared/germany.yaml

# subscription, location, country inherited from shared/germany.yaml
resourceGroup: rg-iot-hamburg-assembly-prod

labels:
  environment: prod
  city: Hamburg

parameters:
  clusterName: hamburg-assembly-prod-arc
  brokerConfig:
    frontendReplicas: 4
    frontendWorkers: 2
    backendRedundancyFactor: 2
    backendWorkers: 4
    backendPartitions: 2
    memoryProfile: High
