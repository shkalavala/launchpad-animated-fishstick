# Chicago Staging Site
#
# Target with: -l environment=staging   (the default `environment=dev` selector
# in aio-install.yaml does not match this site.)

apiVersion: siteops/v1
kind: Site
name: chicago-staging
inherits: shared/usa-east.yaml

# subscription, location, country inherited from shared/usa-east.yaml
resourceGroup: rg-iot-chicago-staging

labels:
  environment: staging
  city: Chicago

parameters:
  clusterName: chicago-staging-arc
