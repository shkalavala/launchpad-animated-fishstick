# Stockholm Bar Lathes - Production Site
#
# Production AIO instance for the Stockholm bar-lathes factory.

apiVersion: siteops/v1
kind: Site
name: stockholm-bar-prod
inherits: shared/sweden.yaml

# subscription, location, country inherited from shared/sweden.yaml
resourceGroup: rg-iot-stockholm-bar-prod

labels:
  environment: prod
  city: Stockholm

parameters:
  clusterName: stockholm-bar-prod-arc
  brokerConfig:
    frontendReplicas: 4
    frontendWorkers: 2
    backendRedundancyFactor: 2
    backendWorkers: 4
    backendPartitions: 2
    memoryProfile: High
