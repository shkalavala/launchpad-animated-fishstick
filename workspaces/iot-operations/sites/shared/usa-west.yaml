# USA West Regional Template (Subscription-Level)
#
# Inheritance: base-site.yaml → usa-west.yaml → <factory>-<env>.yaml
#
# This template represents the USA West subscription - shared by West Coast factories.
# Sites inheriting from this get subscription + location + country pre-configured.
#
# Hierarchy:
#   usa-west.yaml (subscription-level)
#     ├── seattle-dev.yaml (RG-level)
#     └── seattle-prod.yaml (RG-level)

apiVersion: siteops/v1
kind: SiteTemplate
name: usa-west
inherits: ../base-site.yaml

subscription: "00000000-0000-0000-0000-000000000000"
location: westus

labels:
  country: US
  region: americas
