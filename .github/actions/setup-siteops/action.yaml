name: "Setup Site Ops"
description: "Install Python and Site Ops. Stable input contract documented in docs/ci-cd-setup.md."

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  install-dev:
    description: "Include dev dependencies (pytest, pytest-cov)"
    required: false
    default: "false"
  siteops-source:
    description: "siteops install source. Empty = local editable install. Pin to a tag or SHA (mutable refs share a cache slot)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-siteops-${{ inputs.siteops-source || format('{0}{1}', inputs.install-dev == 'true' && 'dev-' || '', hashFiles('pyproject.toml')) }}
        restore-keys: |
          ${{ runner.os }}-pip-siteops-
          ${{ runner.os }}-pip-

    - name: Install Site Ops
      shell: bash
      env:
        INSTALL_DEV: ${{ inputs.install-dev }}
        SITEOPS_SOURCE: ${{ inputs.siteops-source }}
      run: |
        pip install --upgrade pip
        if [ -n "$SITEOPS_SOURCE" ]; then
          pip install "$SITEOPS_SOURCE"
        elif [[ "$INSTALL_DEV" == "true" ]]; then
          pip install -e ".[dev]"
        else
          pip install -e .
        fi

    - name: Verify Site Ops installation
      shell: bash
      run: siteops --version
