version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # limit to security updates only
    open-pull-requests-limit: 0
    commit-message:
      prefix: "chore(pip-deps)"
      prefix-development: "chore(pip-dev-deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(actions)"
