# Validates manifests and runs unit tests on push and pull requests

name: CI

on:
  push:
    branches: [main]
    paths:
      - "siteops/**"
      - "workspaces/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "siteops/**"
      - "workspaces/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Site Ops
        uses: ./.github/actions/setup-siteops
        with:
          install-dev: "true"

      - name: Run ruff
        run: ruff check siteops tests scripts

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Site Ops
        uses: ./.github/actions/setup-siteops
        with:
          install-dev: "true"

      - name: Run unit tests
        run: pytest tests/ -v --cov=siteops --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=test-results.xml

      - name: Test Summary
        if: always()
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os

          if not os.path.exists("test-results.xml"):
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("## \u274c Test Results\n\nNo test results found.\n")
              raise SystemExit(0)

          tree = ET.parse("test-results.xml")
          root = tree.getroot()

          # Handle both <testsuites> (wrapper) and <testsuite> (direct) root elements
          suites = root.findall("testsuite") if root.tag == "testsuites" else [root]

          tests = sum(int(s.attrib.get("tests", 0)) for s in suites)
          failures = sum(int(s.attrib.get("failures", 0)) for s in suites)
          errors = sum(int(s.attrib.get("errors", 0)) for s in suites)
          skipped = sum(int(s.attrib.get("skipped", 0)) for s in suites)
          passed = tests - failures - errors - skipped
          time_taken = sum(float(s.attrib.get("time", 0)) for s in suites)

          icon = "\u2705" if failures == 0 and errors == 0 else "\u274c"
          summary = f"## {icon} Test Results\n\n"
          summary += "| Passed | Failed | Errors | Skipped | Total | Time |\n"
          summary += "|--------|--------|--------|---------|-------|------|\n"
          summary += f"| {passed} | {failures} | {errors} | {skipped} | {tests} | {time_taken:.1f}s |\n"

          if failures > 0 or errors > 0:
              summary += "\n### Failed Tests\n\n"
              for suite in root.iter("testsuite"):
                  for case in suite.iter("testcase"):
                      failure = case.find("failure")
                      error = case.find("error")
                      if failure is not None or error is not None:
                          name = case.attrib.get("name", "unknown")
                          classname = case.attrib.get("classname", "")
                          msg = (failure or error).attrib.get("message", "")
                          summary += f"- `{classname}::{name}`: {msg}\n"

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary + "\n")

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  validate:
    name: Validate Manifests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Site Ops
        uses: ./.github/actions/setup-siteops

      - name: Validate Bicep templates
        shell: pwsh
        run: ./scripts/validate-bicep.ps1

      - name: Find manifests
        id: find
        shell: bash
        env:
          WORKSPACE_DIR: workspaces/iot-operations
        # Discover every standalone Manifest YAML across the standard top-level
        # dirs so CI validates standalone manifests (manifests/) and sample
        # entry points (samples/<name>/manifest.yaml) consistently. Excludes:
        #   - partials (filename prefixed `_`), which fail standalone validation
        #     by design when they reference outputs from a parent's earlier steps.
        #   - parameters files in samples (inputs.yaml, outputs.yaml, etc.),
        #     which are not manifests.
        run: |
          MANIFESTS=$(
            { find "$WORKSPACE_DIR/manifests" -maxdepth 1 \
                \( -name "*.yaml" -o -name "*.yml" \) -not -name "_*" 2>/dev/null
              find "$WORKSPACE_DIR/samples" -mindepth 2 -maxdepth 2 \
                \( -name "manifest.yaml" -o -name "manifest.yml" \) 2>/dev/null
            } | tr '\n' ' '
          )
          echo "manifests=$MANIFESTS" >> $GITHUB_OUTPUT

          if [[ -z "$MANIFESTS" ]]; then
            echo "::warning::No manifests found in $WORKSPACE_DIR"
          else
            echo "Found manifests: $MANIFESTS"
          fi

      - name: Validate manifests and show plans
        if: steps.find.outputs.manifests != ''
        shell: bash
        env:
          MANIFESTS: ${{ steps.find.outputs.manifests }}
          WORKSPACE_DIR: workspaces/iot-operations
        run: |
          echo "## Deployment Plans" >> $GITHUB_STEP_SUMMARY
          EXIT_CODE=0

          for manifest in $MANIFESTS; do
            manifest_rel="${manifest#$WORKSPACE_DIR/}"
            echo "::group::Validating $manifest"
            echo "### $(basename $manifest)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            # validate -v validates and shows deployment plan
            if siteops -w "$WORKSPACE_DIR" validate "$manifest_rel" -v 2>&1 | tee -a $GITHUB_STEP_SUMMARY; then
              echo "✓ Valid"
            else
              EXIT_CODE=1
            fi

            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::endgroup::"
          done

          exit $EXIT_CODE
